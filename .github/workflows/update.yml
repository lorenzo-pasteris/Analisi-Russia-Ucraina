name: Aggiornamento dati CBR

on:
  schedule:
    # Ogni giovedì alle 15:10 UTC — la CBR pubblica le riserve settimanali il giovedì.
    # (Tassi e cambi arrivano in blocco settimanale; per averli giornalieri,
    #  riporta il cron a "10 15 * * *")
    - cron: "10 15 * * 4"
  workflow_dispatch: {}   # permette il lancio manuale dal tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install requests pandas

      - name: Scarica dati CBR
        run: python fetch_cbr.py

      - name: Commit dei nuovi dati
        run: |
          git config user.name "cbr-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nessun dato nuovo oggi."
          else
            git commit -m "Dati CBR $(date -u +%Y-%m-%d)"
            git push
          fi
